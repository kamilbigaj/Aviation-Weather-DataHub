version: '3.8'

services:
  # --- DATABASE SERVICE ---
  postgres_db:
    image: postgres:15
    container_name: aviation_postgres
    environment:
      POSTGRES_USER: kamilbigaj
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kamilbigaj -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- PYTHON ETL SCRIPT SERVICE ---
  etl_app:
    build: .
    container_name: aviation_etl_script
    depends_on:
      postgres_db:
        condition: service_healthy
    env_file:
      - .env